# Arti Configuration for EventHorizon
# (Optimized for M5 MacBook Pro)

[application]
watch_configuration = true

[proxy]
# SOCKS proxy port (Consolidated to standard 9050 for C-Tor phase-out)
socks_listen = 9050
dns_listen = 0

[logging]
console = "info"
# Rotate logs daily and keep 5 historical copies
files = [
         {path = "/Users/rds/antigravity/umbra/var/log/arti.log", filter="info", rotate="daily", count=5},
]

[storage]
# Persist data to the project-relative directory
cache_dir = "/Users/rds/antigravity/umbra/var/cache/arti"
state_dir = "/Users/rds/antigravity/umbra/var/lib/arti"

[storage.keystore]
enabled = true

[storage.permissions]
# Strict permissions on Darwin
trust_user = ":current"

[path_rules]
# Standard circuit path rules
ipv4_subnet_family_prefix = 16
ipv6_subnet_family_prefix = 32

# Bridge and Relay settings (Disabled as per directive)
[bridges]
enabled = false

[tor_network]
# Use default authorities and fallbacks

# Note: Hidden Service configuration will be added here 
# once we establish the programmatic integration workflow.
