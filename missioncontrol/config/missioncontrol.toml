# MissionControl Configuration

[server]
# Bind only to localhost for security
listen_addr = "127.0.0.1:3030"
database_path = "data/missioncontrol.db"

[arti]
# Embedded Arti directories (isolated from umbra/bin/arti)
state_dir = "data/arti/state"
cache_dir = "data/arti/cache"

[guardian]
# Network Shield integration (Guardian service must be running)
api_url = "http://127.0.0.1"
api_port = 9109
enabled = true
store_history = true
